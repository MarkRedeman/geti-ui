name: Visual Regression

on:
    pull_request:
        branches: [main]

permissions: {}

jobs:
    detect-changes:
        name: Detect changed component categories
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read # required for changed-files API access on pull_request
        outputs:
            components: ${{ steps.filter.outputs.changes }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
              id: filter
              with:
                  list-files: json
                  filters: |
                      ui: 'packages/ui/src/components/ui/**'
                      form: 'packages/ui/src/components/form/**'
                      pickers: 'packages/ui/src/components/form/pickers/**'
                      navigation: 'packages/ui/src/components/navigation/**'
                      feedback: 'packages/ui/src/components/feedback/**'
                      overlays: 'packages/ui/src/components/overlays/**'
                      data: 'packages/ui/src/components/data/**'
                      layouts: 'packages/ui/src/components/layouts/**'
                      blocks: 'packages/blocks/src/**'

    visual-test:
        name: Run visual regression checks
        needs: detect-changes
        if: ${{ needs.detect-changes.outputs.components != '[]' }}
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write # post/update PR result comment
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
                  cache: npm

            - run: npm ci

            - run: npm run docs:build

            - name: Install Playwright
              run: npm exec --workspace=@geti-ui/documentation -- playwright install --with-deps chromium

            - name: Run targeted visual tests
              id: visual_tests
              working-directory: documentation
              env:
                  CHANGED: ${{ needs.detect-changes.outputs.components }}
              run: |
                  PATTERN=$(echo "$CHANGED" | jq -r 'map(gsub("([][(){}.^$+*?|\\\\-])"; "\\\\\\\\\\1")) | unique | join("|")')
                  if [ -z "$PATTERN" ]; then
                    echo "No matching component categories detected; skipping targeted visual run."
                    exit 0
                  fi
                  npm exec -- playwright test --grep "$PATTERN"

            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: visual-regression-report
                  path: documentation/playwright-report/

            - name: Post or update PR comment
              if: always()
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
              env:
                  CHANGED: ${{ needs.detect-changes.outputs.components }}
                  JOB_STATUS: ${{ job.status }}
                  RUN_ID: ${{ github.run_id }}
              with:
                  script: |
                      const marker = '<!-- visual-regression-comment -->';
                      const changed = JSON.parse(process.env.CHANGED || '[]');
                      const status = process.env.JOB_STATUS;
                      const runId = process.env.RUN_ID;
                      const statusEmoji = status === 'success' ? '✅' : status === 'failure' ? '❌' : '⚠️';
                      const body = `${marker}\n### 🎨 Visual Regression Results\n\n**Status:** ${statusEmoji} ${status}\n\n**Changed categories:** ${changed.map(c => `\`${c}\``).join(', ')}\n\n[View Report](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})`;

                      const { data: comments } = await github.rest.issues.listComments({
                        ...context.repo,
                        issue_number: context.issue.number,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...context.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          ...context.repo,
                          issue_number: context.issue.number,
                          body,
                        });
                      }
