name: Release ui

on:
  push:
    branches: [main]

concurrency:
  group: release-ui-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Publish @geti-ai/ui
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create tags + GitHub Releases
      pull-requests: write  # open "Version Packages" PR

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0      # git-cliff needs full history
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run lint --workspace=@geti-ai/ui
      - run: npm run type-check --workspace=@geti-ai/ui
      - run: npm run test --workspace=@geti-ai/ui

      - run: npm run build
        working-directory: packages/ui

      # Either opens "Version Packages" PR, or publishes if that PR was just merged
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: npm publish --workspace=@geti-ai/ui
          version: npx changeset version
          commit: "chore(release): version ui"
          title: "chore(release): version ui"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # After publish: generate release notes with git-cliff and create GitHub Release
      - name: Generate release notes with git-cliff
        if: steps.changesets.outputs.published == 'true'
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4
        with:
          config: cliff.toml
          args: --latest --strip header --tag-pattern "v[0-9].*"
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Resolve published @geti-ai/ui version
        if: steps.changesets.outputs.published == 'true'
        id: release_meta
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const target = packages.find((pkg) => pkg.name === '@geti-ai/ui') ?? packages[0];
            if (!target?.version) {
              core.warning('Package not published in this run; skipping GitHub Release.');
              core.setOutput('version', '');
              return;
            }
            core.setOutput('version', target.version);

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true' && steps.release_meta.outputs.version != '' && hashFiles('RELEASE_NOTES.md') != ''
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ format('v{0}', steps.release_meta.outputs.version) }}
          token: ${{ secrets.GITHUB_TOKEN }}
