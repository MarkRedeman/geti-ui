name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions: {}

jobs:
    docs:
        name: Docs checks
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Documentation coverage check
              run: npm run docs:check:coverage

            - name: Documentation no-stories-imports check
              run: npm run docs:check:no-stories-imports

            - name: Build documentation
              run: npm run docs:build

    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run type-check
              working-directory: packages/ui

            - name: Format check
              run: npm run format:check
              working-directory: packages/ui

            - name: Unit tests
              run: npm run test
              working-directory: packages/ui

            - name: Build library
              run: npm run build
              working-directory: packages/ui

    playwright:
        name: Playwright E2E (docs)
        runs-on: ubuntu-latest
        needs: [docs, ci]
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers (docs)
              run: npm exec --workspace=@geti/documentation -- playwright install --with-deps chromium

            - name: Run docs routes smoke test
              run: npm run docs:test:e2e
              env:
                  CI: true

            - name: Upload docs Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: docs-playwright-report
                  path: documentation/playwright-report
                  retention-days: 7
