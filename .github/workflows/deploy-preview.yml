name: Deploy Preview

on:
    pull_request:
        branches: [main]

permissions: {}

concurrency:
    group: deploy-preview-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-preview:
        name: Deploy documentation preview
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read # checkout source
            deployments: write # Cloudflare GitHub Deployment status
            pull-requests: write # post/update PR preview comment
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build documentation
              run: npm run docs:build

            - name: Deploy to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: pages deploy documentation/doc_build --project-name=geti-ui-docs --branch=${{ github.head_ref }}
                  gitHubToken: ${{ secrets.GITHUB_TOKEN }}

            - name: Post or update PR preview comment
              uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
              env:
                  DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
                  ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
                  COMMIT_SHA: ${{ github.sha }}
              with:
                  script: |
                      const marker = '<!-- deploy-preview-comment -->';
                      const deploymentUrl = process.env.DEPLOYMENT_URL;
                      const aliasUrl = process.env.ALIAS_URL;
                      const sha = process.env.COMMIT_SHA;
                      const body = [
                        marker,
                        '## Documentation Preview',
                        '',
                        `| | URL |`,
                        `|---|---|`,
                        `| **This commit** | ${deploymentUrl} |`,
                        `| **Branch** | ${aliasUrl} |`,
                        '',
                        `Generated from commit \`${sha}\``,
                      ].join('\n');

                      const { data: comments } = await github.rest.issues.listComments({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body,
                        });
                      }
