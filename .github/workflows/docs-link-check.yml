name: Docs External Link Check

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  external-links:
    name: External links (preview URL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read # read PR comments to resolve deploy-preview branch URL
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Resolve preview URL from deploy-preview comment
        id: preview
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const marker = '<!-- deploy-preview-comment -->';
            const branchUrlPattern = /\|\s*\*\*Branch\*\*\s*\|\s*(https?:\/\/[^\s|]+)\s*\|/;

            for (let attempt = 1; attempt <= 30; attempt++) {
              const { data: comments } = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              const previewComment = comments.find((comment) => comment.body?.includes(marker));
              const match = previewComment?.body?.match(branchUrlPattern);
              const previewUrl = match?.[1];

              if (previewUrl) {
                core.info(`Found preview URL from deploy-preview comment: ${previewUrl}`);
                core.setOutput('url', previewUrl);
                return;
              }

              core.info(`Waiting for deploy-preview comment, attempt ${attempt}/30`);
              await new Promise((resolve) => setTimeout(resolve, 10_000));
            }

            core.setFailed('Could not resolve preview URL from deploy-preview comment within timeout.');

      - name: Wait for preview deployment
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Preview is available at $PREVIEW_URL"
              exit 0
            fi
            echo "Waiting for preview ($PREVIEW_URL), attempt $i/30, status=$STATUS"
            sleep 10
          done
          echo "Preview URL did not become available in time: $PREVIEW_URL"
          exit 1

      - name: Lychee external links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,301,302,303,307,308,403,429
            --config ./documentation/lychee.toml
            '${{ steps.preview.outputs.url }}'

      - name: Upload external link report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: docs-external-links
          path: lychee/out.md
          retention-days: 7
