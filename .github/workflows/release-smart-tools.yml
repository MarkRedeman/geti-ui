name: Release smart-tools

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      opencv_version:
        description: OpenCV version to use for release build
        required: false
        default: "4.9.0"
      emsdk_version:
        description: Emscripten image tag to use for OpenCV build
        required: false
        default: "3.1.25"

concurrency:
  group: release-smart-tools-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  opencv:
    name: Build OpenCV artifact
    uses: ./.github/workflows/opencv-build.yml
    with:
      opencv_version: ${{ inputs.opencv_version }}
      emsdk_version: ${{ inputs.emsdk_version }}

  release:
    name: Publish @geti-ai/smart-tools
    needs: [opencv]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags + release commit when changesets publishes
      pull-requests: write # open/update Version Packages PR for smart-tools
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Download OpenCV artifact
        uses: actions/download-artifact@v6
        with:
          name: ${{ needs.opencv.outputs.artifact_name }}
          path: opencv-artifacts

      - name: Place OpenCV artifact in source path
        env:
          OPENCV_VERSION: ${{ needs.opencv.outputs.opencv_version }}
        run: |
          set -euo pipefail
          OUT_DIR="packages/smart-tools/src/opencv/${OPENCV_VERSION}"
          mkdir -p "$OUT_DIR"
          cp opencv-artifacts/opencv.js "$OUT_DIR/opencv.js"
          if [ -f opencv-artifacts/opencv.wasm ]; then
            cp opencv-artifacts/opencv.wasm "$OUT_DIR/opencv.wasm"
          fi

      - run: npm run lint --workspace=@geti-ai/smart-tools
      - run: npm run type-check --workspace=@geti-ai/smart-tools
      - run: npm run test --workspace=@geti-ai/smart-tools
      - run: npm run build --workspace=@geti-ai/smart-tools

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: npm publish --workspace=@geti-ai/smart-tools
          version: npx changeset version
          commit: "chore(release): version smart-tools"
          title: "chore(release): version smart-tools"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes with git-cliff
        if: steps.changesets.outputs.published == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --tag-pattern "smart-tools-v[0-9].*"
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Resolve published @geti-ai/smart-tools version
        if: steps.changesets.outputs.published == 'true'
        id: release_meta
        uses: actions/github-script@v8
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const target = packages.find((pkg) => pkg.name === '@geti-ai/smart-tools') ?? packages[0];
            if (!target?.version) {
              core.warning('Package not published in this run; skipping GitHub Release.');
              core.setOutput('version', '');
              return;
            }
            core.setOutput('version', target.version);

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true' && steps.release_meta.outputs.version != '' && hashFiles('RELEASE_NOTES.md') != ''
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ format('smart-tools-v{0}', steps.release_meta.outputs.version) }}
          token: ${{ secrets.GITHUB_TOKEN }}
