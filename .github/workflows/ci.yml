name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

permissions: {}

jobs:
    docs:
        name: Docs checks
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Documentation coverage check
              run: npm run docs:check:coverage

            - name: Documentation sidebar check
              run: npm run docs:check:sidebar

            - name: Documentation internal links check
              run: npm run docs:check:links

            - name: Build documentation
              run: npm run docs:build

            - name: Build MCP server (uses doc_build from previous step)
              run: npm run mcp:build

    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check (ui)
              run: npm run type-check
              working-directory: packages/ui

            - name: Build library (ui)
              run: npm run build
              working-directory: packages/ui

            - name: Type check (smart-tools)
              run: npm run type-check
              working-directory: packages/smart-tools

            - name: Type check (charts)
              run: npm run type-check
              working-directory: packages/charts

            - name: Type check (blocks)
              run: npm run type-check
              working-directory: packages/blocks

            - name: Type check (mcp)
              run: npm run type-check
              working-directory: packages/mcp

            - name: Format check (ui)
              run: npm run format:check
              working-directory: packages/ui

            - name: Format check (blocks)
              run: npm run format:check
              working-directory: packages/blocks

            - name: Lint (blocks)
              run: npm run lint
              working-directory: packages/blocks

            - name: Lint (mcp)
              run: npm run lint
              working-directory: packages/mcp

            - name: Unit tests (ui)
              run: npm run test
              working-directory: packages/ui

            - name: Unit tests (smart-tools)
              run: npm run test
              working-directory: packages/smart-tools

            - name: Unit tests (charts)
              run: npm run test
              working-directory: packages/charts

            - name: Unit tests (blocks)
              run: npm run test
              working-directory: packages/blocks

            - name: Unit tests (mcp)
              run: npm run test
              working-directory: packages/mcp

            - name: Build library (smart-tools)
              run: npm run build
              working-directory: packages/smart-tools

            - name: Build library (charts)
              run: npm run build
              working-directory: packages/charts

            - name: Build library (blocks)
              run: npm run build
              working-directory: packages/blocks

    playwright:
        name: Playwright E2E (docs)
        runs-on: ubuntu-latest
        needs: [docs, ci]
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers (docs)
              run: npm exec --workspace=@geti-ui/documentation -- playwright install --with-deps chromium

            - name: Run docs routes smoke test
              run: npm run docs:test:e2e
              env:
                  CI: true

            - name: Upload docs Playwright report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              if: always()
              with:
                  name: docs-playwright-report
                  path: documentation/playwright-report
                  retention-days: 7
