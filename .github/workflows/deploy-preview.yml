name: Deploy Preview

on:
    pull_request:
        branches: [main]

permissions: {}

concurrency:
    group: deploy-preview-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy-preview:
        name: Deploy documentation preview
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pages: write
            id-token: write
            pull-requests: write
        environment:
            name: preview
            url: ${{ steps.deploy.outputs.page_url }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build documentation
              run: npm run docs:build

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: documentation/doc_build

            - name: Deploy to GitHub Pages
              id: deploy
              uses: actions/deploy-pages@v4

            - name: Post or update PR preview comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const marker = '<!-- deploy-preview-comment -->';
                      const url = '${{ steps.deploy.outputs.page_url }}';
                      const body = `${marker}\n## Documentation Preview\n\n🚀 Deployed to: ${url}\n\nGenerated from commit \`${{ github.sha }}\``;

                      const { data: comments } = await github.rest.issues.listComments({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                      });
                      const existing = comments.find(c => c.body.includes(marker));
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: existing.id,
                          body,
                        });
                      } else {
                        await github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body,
                        });
                      }
