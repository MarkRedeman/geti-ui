name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    docs:
        name: Docs checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Documentation coverage check
              run: pnpm docs:check:coverage

            - name: Documentation no-stories-imports check
              run: pnpm docs:check:no-stories-imports

            - name: Build documentation
              run: pnpm docs:build

    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm type-check
              working-directory: packages/ui

            - name: Format check
              run: pnpm format:check
              working-directory: packages/ui

            - name: Unit tests
              run: pnpm test
              working-directory: packages/ui

            - name: Build library
              run: pnpm build
              working-directory: packages/ui

    playwright:
        name: Playwright E2E (docs)
        runs-on: ubuntu-latest
        needs: [docs, ci]
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright browsers (docs)
              run: pnpm --filter @geti/documentation exec playwright install --with-deps chromium

            - name: Run docs routes smoke test
              run: pnpm docs:test:e2e
              env:
                  CI: true

            - name: Upload docs Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: docs-playwright-report
                  path: documentation/playwright-report
                  retention-days: 7
