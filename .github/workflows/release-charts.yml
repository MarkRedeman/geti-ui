name: Release charts

on:
  push:
    branches: [main]

concurrency:
  group: release-charts-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Publish @geti-ai/charts
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run lint --workspace=@geti-ai/charts
      - run: npm run type-check --workspace=@geti-ai/charts
      - run: npm run test --workspace=@geti-ai/charts
      - run: npm run build --workspace=@geti-ai/charts

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: npm publish --workspace=@geti-ai/charts
          version: npx changeset version
          commit: "chore(release): version charts"
          title: "chore(release): version charts"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate release notes with git-cliff
        if: steps.changesets.outputs.published == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Resolve published @geti-ai/charts version
        if: steps.changesets.outputs.published == 'true'
        id: release_meta
        uses: actions/github-script@v8
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const target = packages.find((pkg) => pkg.name === '@geti-ai/charts') ?? packages[0];
            if (!target?.version) {
              core.setFailed('Could not resolve published package version');
              return;
            }
            core.setOutput('version', target.version);

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true' && hashFiles('RELEASE_NOTES.md') != ''
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ format('charts-v{0}', steps.release_meta.outputs.version) }}
          token: ${{ secrets.GITHUB_TOKEN }}
