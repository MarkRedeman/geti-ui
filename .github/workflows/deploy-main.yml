name: Deploy Main

on:
    push:
        branches: [main]

permissions: {}

concurrency:
    group: deploy-main
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy documentation to GitHub Pages
        runs-on: ubuntu-latest
        permissions:
            contents: read # checkout source
            pages: write # publish documentation artifact to Pages
            id-token: write # authenticate OIDC for Pages deployment
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build documentation
              run: npm run docs:build

            - name: Configure GitHub Pages
              uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

            # We intentionally do not use actions/upload-pages-artifact here.
            # The pinned v4 SHA in this repo excludes dotfiles/directories, which
            # drops `.well-known/` and `.nojekyll` from the deploy artifact.
            # We package and upload the tarball ourselves so AI skill discovery
            # endpoints under `/.well-known/skills/*` are preserved on Pages.
            - name: Archive Pages artifact
              run: |
                  tar \
                    --dereference --hard-dereference \
                    --directory documentation/doc_build \
                    -cvf "$RUNNER_TEMP/artifact.tar" \
                    --exclude=.git \
                    --exclude=.github \
                    .

            - name: Upload Pages artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with:
                  name: github-pages
                  path: ${{ runner.temp }}/artifact.tar
                  retention-days: 1
                  if-no-files-found: error

            - name: Deploy to GitHub Pages
              id: deploy
              uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
