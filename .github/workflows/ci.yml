name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    docs:
        name: Docs checks
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Documentation coverage check
              run: pnpm docs:check:coverage

            - name: Documentation Storybook-coupling check
              run: pnpm docs:check:no-stories-imports

            - name: Build documentation
              run: pnpm docs:build

            - name: Install Playwright browsers (docs)
              run: pnpm --filter @geti/documentation exec playwright install --with-deps chromium

            - name: Docs routes smoke test
              run: pnpm docs:test:e2e
              env:
                  CI: true

            - name: Upload docs Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: docs-playwright-report
                  path: documentation/playwright-report
                  retention-days: 7

    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type check
              run: pnpm type-check
              working-directory: packages/ui

            - name: Format check
              run: pnpm format:check
              working-directory: packages/ui

            - name: Unit tests
              run: pnpm test
              working-directory: packages/ui

            - name: Build library
              run: pnpm build
              working-directory: packages/ui

            - name: Build Storybook
              run: pnpm storybook:build
              working-directory: packages/ui

            - name: Upload Storybook artifact
              uses: actions/upload-artifact@v4
              with:
                  name: storybook-static
                  path: packages/ui/storybook-static
                  retention-days: 7

    playwright:
        name: Playwright E2E
        runs-on: ubuntu-latest
        needs: [ci, docs]
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Download Storybook artifact
              uses: actions/download-artifact@v4
              with:
                  name: storybook-static
                  path: packages/ui/storybook-static

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium
              working-directory: packages/ui

            - name: Run E2E tests (static Storybook)
              run: pnpm exec playwright test --reporter=html
              working-directory: packages/ui
              env:
                  CI: true
                  STORYBOOK_STATIC: true

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: packages/ui/playwright-report
                  retention-days: 7
