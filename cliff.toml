[changelog]
header = """
# Changelog

All notable changes to the Geti UI Design System are documented here.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
  {{ commit.message | upper_first }} \
  ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = "<!-- generated by git-cliff -->"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "♻️  Refactoring" },
  { message = "^test", group = "🧪 Tests", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore|^ci|^build|^docs", group = "🔧 Maintenance" },
  { message = "^style", skip = true },
]

protect_breaking_commits = true
filter_commits = true
tag_pattern = "@geti-ai/ui@[0-9].*"
