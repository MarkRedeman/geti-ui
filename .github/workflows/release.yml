name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release:
    name: Publish package and release notes
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create tags + GitHub Releases
      pull-requests: write  # open "Version Packages" PR

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0      # git-cliff needs full history
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build
        working-directory: packages/ui

      # Either opens "Version Packages" PR, or publishes if that PR was just merged
      - uses: changesets/action@v1
        id: changesets
        with:
          publish: npm publish --workspace=@geti/ui
          version: npx changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # After publish: generate release notes with git-cliff and create GitHub Release
      - name: Generate release notes with git-cliff
        if: steps.changesets.outputs.published == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Resolve published @geti/ui version
        if: steps.changesets.outputs.published == 'true'
        id: release_meta
        uses: actions/github-script@v8
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const target = packages.find((pkg) => pkg.name === '@geti/ui') ?? packages[0];
            if (!target?.version) {
              core.setFailed('Could not resolve published package version');
              return;
            }
            core.setOutput('version', target.version);

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true' && hashFiles('RELEASE_NOTES.md') != ''
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          tag_name: ${{ format('v{0}', steps.release_meta.outputs.version) }}
          token: ${{ secrets.GITHUB_TOKEN }}
