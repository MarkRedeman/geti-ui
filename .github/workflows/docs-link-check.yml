name: Docs External Link Check

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  external-links:
    name: External links (preview URL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Compute Cloudflare preview URL
        id: preview
        env:
          PR_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          BRANCH_SLUG=$(printf '%s' "$PR_BRANCH" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
          PREVIEW_URL="https://${BRANCH_SLUG}.geti-ui-docs.pages.dev"
          echo "url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for preview deployment
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          set -euo pipefail
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PREVIEW_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Preview is available at $PREVIEW_URL"
              exit 0
            fi
            echo "Waiting for preview ($PREVIEW_URL), attempt $i/30, status=$STATUS"
            sleep 10
          done
          echo "Preview URL did not become available in time: $PREVIEW_URL"
          exit 1

      - name: Lychee external links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --verbose
            --no-progress
            --accept 200,206,301,302,303,307,308,403,429
            --config ./documentation/lychee.toml
            '${{ steps.preview.outputs.url }}'

      - name: Upload external link report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: docs-external-links
          path: lychee/out.md
          retention-days: 7
